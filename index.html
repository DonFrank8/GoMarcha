<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PartyRadar</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
}

header {
  text-align:center;
  padding:50px 20px;
}

h1 {
  font-size:48px;
}

.container {
  display:grid;
  grid-template-columns:400px 1fr;
}

.sidebar {
  background:#1b1f2d;
  padding:20px;
  overflow-y:auto;
  height:calc(100vh - 120px);
}

.event {
  background:#202638;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
}

.event:hover {
  border:1px solid #ff0055;
}

#map {
  height:calc(100vh - 120px);
}
</style>
</head>

<body>

<header>
<h1>PartyRadar</h1>
<p>Live Events & Bands auf Karte</p>
</header>

<div class="container">
  <div class="sidebar">
    <h2>Events</h2>
    <div id="status">Lade...</div>
    <div id="events"></div>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://dwyhpirtbjfmohcnhdak.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3eWhwaXJ0YmpmbW9oY25oZGFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTM2MzEsImV4cCI6MjA5MTE2OTYzMX0.FAUJSiEMVa7P5y7hLcaBMFDuHmiFceqIy8z9mTJeUOQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const statusBox = document.getElementById("status");
const eventsBox = document.getElementById("events");

const map = L.map("map").setView([36.55,-4.75],10);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap"
}).addTo(map);

let markers=[];

function clearMarkers(){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
}

async function loadEvents(){

  statusBox.innerText="Lade Events...";

  const {data,error} = await supabase.from("events").select("*");

  if(error){
    statusBox.innerText="Fehler: "+error.message;
    return;
  }

  if(!data || data.length===0){
    statusBox.innerText="Keine Events";
    return;
  }

  statusBox.innerText=data.length+" Events geladen";

  eventsBox.innerHTML="";
  clearMarkers();

  data.forEach(event=>{

    const div=document.createElement("div");
    div.className="event";

    div.innerHTML=`
      <b>${event.name}</b><br>
      ${event.city}<br>
      ${event.genre}
    `;

    div.onclick=()=>{
      map.setView([event.lat,event.lng],13);
    }

    eventsBox.appendChild(div);

    if(event.lat && event.lng){
      const marker=L.marker([event.lat,event.lng]).addTo(map)
      .bindPopup(event.name);

      markers.push(marker);
    }

  });
}

loadEvents();

</script>

</body>
</html>
