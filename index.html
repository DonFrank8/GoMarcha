<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PartyRadar</title>

<style>
body {margin:0;font-family:Arial;background:#0b0b0f;color:white;}
header{text-align:center;padding:60px 20px;}
h1{font-size:48px;}
.layout{display:grid;grid-template-columns:420px 1fr;gap:20px;padding:20px;}
.sidebar{background:#1b1f2d;padding:20px;border-radius:12px;}
.map{background:#111723;border-radius:12px;padding:20px;}
.event{background:#202638;margin-bottom:10px;padding:12px;border-radius:10px;cursor:pointer;}
input,select{width:100%;padding:10px;margin-bottom:10px;background:#202638;color:white;border:1px solid #444;}
button{padding:8px 12px;background:#ff0055;color:white;border:none;cursor:pointer;}
</style>
</head>

<body>

<header>
<h1>PartyRadar</h1>
<p>Finde Events wie auf Immobilienplattformen</p>
</header>

<div class="layout">

<div class="sidebar">

<input id="search" placeholder="Suche..." oninput="update()">

<select id="cityFilter" onchange="update()">
<option value="All">Alle Städte</option>
<option>Marbella</option>
<option>Málaga</option>
<option>Estepona</option>
</select>

<select id="dateFilter" onchange="update()">
<option value="All">Alle Daten</option>
<option>12.07.2026</option>
<option>13.07.2026</option>
<option>14.07.2026</option>
</select>

<div id="events"></div>

</div>

<div class="map">
<h3>Karte (Demo)</h3>
<div id="mapInfo">Event auswählen</div>
</div>

</div>

<script>

const events = [
{name:"Latin Night",city:"Marbella",date:"12.07.2026",genre:"Latin"},
{name:"House Party",city:"Málaga",date:"13.07.2026",genre:"House"},
{name:"Flamenco Show",city:"Estepona",date:"14.07.2026",genre:"Flamenco"}
];

function update(){
const search=document.getElementById("search").value.toLowerCase();
const city=document.getElementById("cityFilter").value;
const date=document.getElementById("dateFilter").value;

let filtered=events.filter(e=>{
return (
(e.name.toLowerCase().includes(search) || e.genre.toLowerCase().includes(search)) &&
(city==="All" || e.city===city) &&
(date==="All" || e.date===date)
);
});

render(filtered);
}

function render(list){
const container=document.getElementById("events");
container.innerHTML="";

list.forEach(e=>{
const div=document.createElement("div");
div.className="event";
div.innerHTML=`<b>${e.name}</b><br>${e.city} - ${e.date}<br>${e.genre}`;
div.onclick=()=>show(e);
container.appendChild(div);
});
}

function show(e){
document.getElementById("mapInfo").innerHTML=
`<h2>${e.name}</h2><p>${e.city}</p><p>${e.date}</p><p>${e.genre}</p>`;
}

render(events);

</script>

</body>
</html>
