name = "gomarcha-event-share"
main = "worker.js"
compatibility_date = "2026-05-15"

# This route keeps crawler-facing share URLs on gomarcha.com instead of
# functions.supabase.co.
routes = [
  { pattern = "www.gomarcha.com/e/*", zone_name = "gomarcha.com" }
]

[vars]
SUPABASE_URL = "https://dwyhpirtbjfmohcnhdak.supabase.co"
PUBLIC_SITE_URL = "https://www.gomarcha.com"
DEFAULT_OG_IMAGE_URL = "https://www.gomarcha.com/social-preview.png"

# Set one of these as a Cloudflare secret before deploy:
#   wrangler secret put SUPABASE_ANON_KEY
# or, if RLS does not allow public approved-event reads:
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY
